[pytest]
python_files = test_*.py *_test.py *.py
python_functions = test_*
; Filter out live tests by default
addopts = -s -v -m "not live" --ignore=api/src/database/migrations --ignore=api/src/ai/email_approval_demo/agent.py
; addopts = -s -v --ignore=api/src/database/migrations --ignore=api/src/ai/email_approval_demo/agent.py
markers =
    live: hits real third-party APIs — run explicitly with: pytest -m live
pythonpath = .
testpaths = api
asyncio_mode = strict
; Session-scoped loop: the app uses module-level async engines (asyncpg pools).
; With per-test loops, a pool created in one test holds connections bound to a
; closed loop when the next test runs -> "Event loop is closed" failures that
; depend on test order. One shared loop keeps the global pools valid all run.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# logging
log_cli = True
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Disable warnings we don't care about
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
